<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车厘子溯源档案</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin:0; padding:20px; }
    .box { max-width:500px; margin:0 auto; background:white; border-radius:20px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    .head { background:#2d5a27; color:white; padding:20px; text-align:center; }
    .part { padding:15px 20px; border-bottom:1px solid #eee; }
    table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    th,td { border:1px solid #ddd; padding:6px; }
    th { background:#f0f7ee; }
    .farm { background:#f8fbf5; padding:12px; border-radius:10px; border-left:4px solid #2d5a27; }
    canvas { width:100% !important; height:auto !important; }
  </style>
</head>
<body>
  <div class="box">
    <div class="head">
      <h2>🍒 高原有机车厘子</h2>
      <p>批次 BN20260415-001 | 2kg</p>
    </div>
    <div class="part">
      <h3>🌡️ 温控曲线（0~4℃）</h3>
      <canvas id="tempChart" width="400" height="200"></canvas>
      <p style="color:#666;">✅ 全程温度在安全区间，未脱冷</p>
    </div>
    <div class="part">
      <h3>📋 质检报告</h3>
      <table>
        <tr><th>项目</th><th>标准</th><th>结果</th><th>判定</th></tr>
        <tr><td>多菌灵</td><td>≤0.5 mg/kg</td><td>0.08</td><td>✔合格</td></tr>
        <tr><td>铅</td><td>≤0.1 mg/kg</td><td>0.02</td><td>✔合格</td></tr>
        <tr><td>糖度</td><td>≥16°Bx</td><td>18.5</td><td>⭐优级</td></tr>
        <tr><td>硬度</td><td>≥300 g/cm²</td><td>338</td><td>✔合格</td></tr>
      </table>
      <p style="font-size:0.8rem;">检测机构：理县农产品检测中心 | 报告编号 QC-001</p>
    </div>
    <div class="part">
      <h3>🏔️ 溯源农场</h3>
      <div class="farm">
        <strong>雪山阳光农场</strong><br>
        📍四川阿坝理县米亚罗镇<br>
        🌱露天种植，雪山融水灌溉<br>
        🧑‍🌾农场主：陈明
      </div>
    </div>
    <div class="part" style="text-align:center;color:#999;font-size:0.8rem;">
      教学模拟数据，仅供课堂演示
    </div>
  </div>
  <script>
    const ctx = document.getElementById('tempChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['08:00','12:00','18:00','00:00','06:00','12:00','18:00'],
        datasets: [{
          label: '温度 °C',
          data: [2.5, 1.8, 0.9, 3.2, 2.1, 3.0, 2.0],
          borderColor: '#2d5a27',
          backgroundColor: 'rgba(45,90,39,0.1)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { min: -1, max: 6, ticks: { callback: v => v+'℃' } } }
      }
    });
  </script>
</body>
</html>
